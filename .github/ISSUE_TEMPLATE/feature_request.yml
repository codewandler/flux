name: Feature request
description: Propose a capability or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        flux favors **quality over quantity** — a small, correct, fully-tested surface over feature
        count (see [docs/vision.md](https://github.com/codewandler/flux/blob/main/docs/vision.md)).
        Proposals that fit the direction and can be held to the green gate are most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should flux do? Sketch the surface (CLI flag, tool, SDK method, …) if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or how you work around it now.
  - type: checkboxes
    id: fit
    attributes:
      label: Direction
      options:
        - label: This keeps every IO path inside the safety envelope (no bypass).
        - label: I'd be willing to help implement it.
