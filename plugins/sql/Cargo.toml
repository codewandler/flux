[package]
name = "sql"
edition.workspace = true
version.workspace = true
license.workspace = true

[[bin]]
name = "flux-plugin-sql"
path = "src/main.rs"

[dependencies]
host-kit.workspace = true
serde_json.workspace = true
base64.workspace = true
# SCRAM-SHA-256 auth (the modern PostgreSQL default): HMAC-SHA256 + SHA-256 + a
# random client nonce. PBKDF2 is a short HMAC loop we implement here rather than
# pulling the `pbkdf2` crate.
hmac = "0.12"
sha2 = "0.10"
rand = "0.8"
