[package]
name = "loki"
edition.workspace = true
version.workspace = true
license.workspace = true

[[bin]]
name = "flux-plugin-loki"
path = "src/main.rs"

[dependencies]
host-kit.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
# Match the fluxplane reference's entry-id scheme (SHA1 over labels+ts+line) and its RFC3339Nano
# timestamp formatting (unix nanoseconds → RFC3339 with nanosecond precision).
sha1 = "0.10"
time = { version = "0.3", features = ["formatting"] }
