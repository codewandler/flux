id = "coding/fix-add"
category = "coding"
description = "Fix a one-line bug so the unit test passes."
timeout_secs = 300
prompt = "The unit test `tests::adds` in this crate fails because `add` is implemented incorrectly. Fix the bug in src/lib.rs so the test passes. Do not edit the test."

[setup]
kind = "files"
files = [
  { path = "Cargo.toml", content = "[package]\nname = \"addbug\"\nversion = \"0.0.0\"\nedition = \"2021\"\n" },
  { path = "src/lib.rs", content = "pub fn add(a: i32, b: i32) -> i32 {\n    a - b\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    #[test]\n    fn adds() {\n        assert_eq!(add(2, 3), 5);\n    }\n}\n" },
]

[criterion]
kind = "command"
run = "cargo test --quiet"
expect_exit = 0
