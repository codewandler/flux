id = "shell/count-todos"
category = "shell"
description = "Count TODO markers across files and write the number."
timeout_secs = 180
prompt = "Count every line containing the text TODO across all files in this directory and write only that number (no other text) to a file named COUNT.txt."

[setup]
kind = "files"
files = [
  { path = "a.py", content = "x = 1  # TODO fix\n" },
  { path = "b.py", content = "# TODO one\nprint(1)\n# TODO two\n" },
  { path = "notes.txt", content = "nothing to see here\n" },
]

[criterion]
kind = "file_content"
path = "COUNT.txt"
regex = '^\s*3\s*$'
