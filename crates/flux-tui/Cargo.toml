[package]
name = "flux-tui"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "flux ratatui chat UI: streaming chat view + input, driving the agent loop"

[dependencies]
flux-core.workspace = true
flux-agent.workspace = true
flux-flow.workspace = true
flux-runtime.workspace = true
flux-spec.workspace = true
flux-evidence.workspace = true
# `unstable-rendered-line-info` exposes `Paragraph::line_count`, used to size the scrollback.
ratatui = { workspace = true, features = ["unstable-rendered-line-info"] }
crossterm.workspace = true
anyhow.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-util.workspace = true
async-trait.workspace = true

# Markdown rendering for the transcript: markdown-stream parses, markdown-ratatui renders the events
# natively to ratatui `Text` (no ANSI round-trip). Pinned to the same codewandler/markdown rev
# flux-cli uses so the workspace resolves a single markdown-stream. ansi-to-tui now only converts the
# flux-flow plan-tree ANSI (see plan.rs).
markdown-stream = { git = "https://github.com/codewandler/markdown", rev = "35c6db54d7ab12814db738cc019592b83aab6e8a" }
markdown-ratatui = { git = "https://github.com/codewandler/markdown", rev = "35c6db54d7ab12814db738cc019592b83aab6e8a" }
ansi-to-tui = "7"
tui-textarea = "0.7"
