[package]
name = "flux-tui"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "flux ratatui chat UI: streaming chat view + input, driving the agent loop"

[dependencies]
flux-core.workspace = true
flux-agent.workspace = true
flux-flow.workspace = true
flux-runtime.workspace = true
flux-spec.workspace = true
flux-evidence.workspace = true
# `unstable-rendered-line-info` exposes `Paragraph::line_count`, used to size the scrollback.
ratatui = { workspace = true, features = ["unstable-rendered-line-info"] }
crossterm.workspace = true
anyhow.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-util.workspace = true
async-trait.workspace = true

# Markdown rendering for the transcript goes through flux-markdown's `ratatui` feature, which wraps
# markdown-stream (parse) + markdown-ratatui (render natively to ratatui `Text`, no ANSI round-trip).
# ansi-to-tui now only converts the flux-flow plan-tree ANSI (see plan.rs).
flux-markdown = { workspace = true, features = ["ratatui"] }
ansi-to-tui = "7"
tui-textarea = "0.7"
