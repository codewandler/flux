[package]
name = "flux-sdk"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "flux high-level library API: build a tool-enabled, policy-gated agent and run turns"
readme = "README.md"
documentation = "https://docs.rs/flux-sdk"
keywords = ["agent", "llm", "ai", "tools", "flux"]
categories = ["development-tools", "api-bindings"]

[dependencies]
flux-core.workspace = true
flux-provider.workspace = true
flux-runtime.workspace = true
flux-system.workspace = true
flux-tools.workspace = true
flux-session.workspace = true
flux-agent.workspace = true
# Flux-Lang lifecycle surface: the L0 language (artifact prelude), the L3 engine (compile/analyze/
# execute), and the L3 model-op pack wired into the assembled registry.
flux-lang.workspace = true
flux-flow.workspace = true
flux-cognition.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
tokio.workspace = true
futures.workspace = true
# Examples register mock adapter ops (impl flux_runtime::Tool), whose `spec()` returns a flux_spec
# ToolSpec. Dev-only — not in the publish closure.
flux-spec.workspace = true
